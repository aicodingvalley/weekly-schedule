<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weekly Schedule</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Segoe UI", "Apple SD Gothic Neo", sans-serif;
        background: #f2ede7;
        min-height: 100vh;
        padding: 40px 20px 60px;
      }

      .container {
        max-width: 720px;
        margin: 0 auto;
      }

      h1 {
        font-size: 2.6rem;
        font-weight: 800;
        letter-spacing: 0.18em;
        color: #2c2c2c;
        text-align: center;
        margin-bottom: 24px;
      }

      /* ── View tabs ── */
      .view-tabs {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin-bottom: 28px;
      }
      .view-tab {
        background: #e9e3dc;
        color: #8a8a8a;
        border: none;
        cursor: pointer;
        padding: 9px 22px;
        border-radius: 999px;
        font-size: 0.95rem;
        font-weight: 600;
        transition:
          background 0.15s,
          color 0.15s;
      }
      .view-tab.active {
        background: #3d6cff;
        color: #fff;
      }

      /* ── Week / Month nav ── */
      .nav-bar {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 20px;
        margin-bottom: 32px;
      }
      .nav-bar button {
        background: #e9e3dc;
        border: none;
        width: 40px;
        height: 40px;
        border-radius: 10px;
        font-size: 1.1rem;
        color: #8a8a8a;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s;
      }
      .nav-bar button:hover {
        background: #ded6cc;
      }
      .nav-label {
        font-size: 1.05rem;
        color: #8a8a8a;
        font-weight: 500;
        min-width: 180px;
        text-align: center;
      }

      /* ── Day card (week view) ── */
      .day-card {
        background: #fff;
        border-radius: 22px;
        padding: 22px 28px;
        margin-bottom: 14px;
        display: flex;
        align-items: center;
        gap: 28px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      }

      .day-label {
        min-width: 56px;
        text-align: left;
      }
      .day-name {
        font-size: 0.85rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        color: #b2b2b2;
        text-transform: uppercase;
        margin-bottom: 2px;
      }
      .day-num {
        font-size: 2.4rem;
        font-weight: 800;
        color: #2c2c2c;
        line-height: 1;
      }

      .divider {
        width: 1px;
        background: #ece8e3;
        align-self: stretch;
        min-height: 56px;
      }

      .events {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .empty-text {
        color: #b9b4ad;
        font-size: 0.95rem;
      }

      .event {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .event-check {
        appearance: none;
        -webkit-appearance: none;
        width: 20px;
        height: 20px;
        border-radius: 6px;
        border: 2px solid #d6d1cb;
        background: #fff;
        cursor: pointer;
        flex-shrink: 0;
        transition:
          background 0.15s,
          border-color 0.15s;
        position: relative;
      }
      .event-check:checked {
        background: #3d6cff;
        border-color: #3d6cff;
      }
      .event-check:checked::after {
        content: "";
        position: absolute;
        left: 4px;
        top: 1px;
        width: 5px;
        height: 10px;
        border: 2px solid #fff;
        border-top: none;
        border-left: none;
        transform: rotate(45deg);
      }

      .event-time {
        font-size: 1rem;
        font-weight: 600;
        color: #3d6cff;
        min-width: 56px;
      }
      .event-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .event-title {
        font-size: 1.05rem;
        color: #2c2c2c;
        font-weight: 600;
      }

      .event.done .event-title {
        text-decoration: line-through;
        color: #bbb;
      }
      .event.done .event-time {
        color: #bbb;
      }

      .cat-work {
        background: #3d6cff;
      }
      .cat-health {
        background: #4fcf7a;
      }
      .cat-social {
        background: #ffad4f;
      }
      .cat-personal {
        background: #c97bff;
      }

      /* ── Month view ── */
      .month-grid {
        background: #fff;
        border-radius: 22px;
        padding: 22px 18px 18px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      }
      .month-row {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
      }
      .month-head {
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-align: center;
        padding: 6px 0 14px;
        color: #8a8a8a;
      }
      .month-head.sun {
        color: #f06060;
      }
      .month-head.sat {
        color: #4f9eff;
      }

      .month-cell {
        aspect-ratio: 1 / 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: 10px;
        gap: 6px;
        font-size: 1rem;
        color: #2c2c2c;
        font-weight: 500;
        cursor: default;
      }
      .month-cell.other {
        color: #d3ccc3;
      }
      .month-cell.sun {
        color: #f06060;
      }
      .month-cell.sat {
        color: #4f9eff;
      }
      .month-cell.other.sun,
      .month-cell.other.sat {
        color: #d3ccc3;
      }

      .cell-num {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .month-cell.today .cell-num {
        background: #3d6cff;
        color: #fff;
        font-weight: 700;
      }

      .cell-dots {
        display: flex;
        gap: 4px;
        min-height: 6px;
      }
      .cell-dots .event-dot {
        width: 6px;
        height: 6px;
      }

      @media (max-width: 500px) {
        h1 {
          font-size: 2.1rem;
          letter-spacing: 0.15em;
        }
        .day-card {
          gap: 18px;
          padding: 18px 20px;
          border-radius: 18px;
        }
        .day-label {
          min-width: 48px;
        }
        .day-num {
          font-size: 2rem;
        }
        .event-time {
          font-size: 0.95rem;
          min-width: 52px;
        }
        .event-title {
          font-size: 1rem;
        }
        .month-grid {
          padding: 16px 10px 10px;
        }
        .month-cell {
          font-size: 0.9rem;
          padding-top: 6px;
        }
        .cell-num {
          width: 26px;
          height: 26px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 id="page-title">WEEKLY</h1>

      <div class="view-tabs">
        <button
          class="view-tab active"
          data-view="week"
          onclick="setView('week')"
        >
          주간
        </button>
        <button class="view-tab" data-view="month" onclick="setView('month')">
          월간
        </button>
      </div>

      <div class="nav-bar">
        <button onclick="navigate(-1)" aria-label="이전">&#8592;</button>
        <span class="nav-label" id="nav-label"></span>
        <button onclick="navigate(1)" aria-label="다음">&#8594;</button>
      </div>

      <div id="week-view"></div>
      <div id="month-view" style="display: none"></div>
    </div>

    <script>
      const EVENTS = [
        {
          date: "2026-04-13",
          time: "10:00",
          title: "팀 주간회의",
          cat: "work",
        },
        { date: "2026-04-13", time: "19:00", title: "헬스 PT", cat: "health" },
        { date: "2026-04-14", time: "14:00", title: "A사 미팅", cat: "work" },
        { date: "2026-04-14", time: "저녁", title: "선배 약속", cat: "social" },
        { date: "2026-04-15", time: "9:00", title: "메일 정리", cat: "work" },
        { date: "2026-04-15", time: "20:00", title: "러닝 5km", cat: "health" },
        {
          date: "2026-04-16",
          time: "13:00",
          title: "프로젝트 킥오프",
          cat: "work",
        },
        {
          date: "2026-04-16",
          time: "20:30",
          title: "엄마 생신 전화",
          cat: "social",
        },
        {
          date: "2026-04-17",
          time: "10:00",
          title: "클라이언트 피드백",
          cat: "work",
        },
        {
          date: "2026-04-17",
          time: "19:00",
          title: "영화 약속",
          cat: "social",
        },
        {
          date: "2026-04-18",
          time: "11:00",
          title: "브런치 수진이",
          cat: "social",
        },
        {
          date: "2026-04-18",
          time: "15:00",
          title: "독서카페",
          cat: "personal",
        },
      ];

      const DAY_EN = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"];
      const MONTH_EN = [
        "January",
        "February",
        "March",
        "April",
        "May",
        "June",
        "July",
        "August",
        "September",
        "October",
        "November",
        "December",
      ];

      const BASE_WEEK_START = new Date(2026, 3, 12);
      const TODAY = new Date(2026, 3, 24);

      let currentView = "week";
      let weekOffset = 0;
      let monthCursor = new Date(2026, 3, 1);

      function pad(n) {
        return String(n).padStart(2, "0");
      }
      function fmt(d) {
        return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
      }
      function sameYMD(a, b) {
        return (
          a.getFullYear() === b.getFullYear() &&
          a.getMonth() === b.getMonth() &&
          a.getDate() === b.getDate()
        );
      }

      function getWeekStart(offset) {
        const d = new Date(BASE_WEEK_START);
        d.setDate(d.getDate() + offset * 7);
        d.setHours(0, 0, 0, 0);
        return d;
      }

      function doneKey(date, title) {
        return `done:${date}:${title}`;
      }
      function isDone(date, title) {
        return localStorage.getItem(doneKey(date, title)) === "1";
      }
      function toggleDone(date, title) {
        const k = doneKey(date, title);
        localStorage.getItem(k) === "1"
          ? localStorage.removeItem(k)
          : localStorage.setItem(k, "1");
      }

      function setView(view) {
        currentView = view;
        document.querySelectorAll(".view-tab").forEach((btn) => {
          btn.classList.toggle("active", btn.dataset.view === view);
        });
        document.getElementById("page-title").textContent =
          view === "week" ? "WEEKLY" : "MONTHLY";
        document.getElementById("week-view").style.display =
          view === "week" ? "" : "none";
        document.getElementById("month-view").style.display =
          view === "month" ? "" : "none";
        render();
      }

      function navigate(dir) {
        if (currentView === "week") {
          weekOffset += dir;
        } else {
          monthCursor = new Date(
            monthCursor.getFullYear(),
            monthCursor.getMonth() + dir,
            1,
          );
        }
        render();
      }

      function render() {
        currentView === "week" ? renderWeek() : renderMonth();
      }

      function renderWeek() {
        const start = getWeekStart(weekOffset);
        const end = new Date(start);
        end.setDate(end.getDate() + 6);

        document.getElementById("nav-label").textContent =
          `${MONTH_EN[start.getMonth()]} ${start.getDate()} – ${end.getDate()}, ${start.getFullYear()}`;

        const container = document.getElementById("week-view");
        container.innerHTML = "";

        for (let i = 0; i < 7; i++) {
          const d = new Date(start);
          d.setDate(d.getDate() + i);
          const ds = fmt(d);
          const evs = EVENTS.filter((e) => e.date === ds);

          const card = document.createElement("div");
          card.className = "day-card";

          const label = document.createElement("div");
          label.className = "day-label";
          label.innerHTML = `<div class="day-name">${DAY_EN[d.getDay()]}</div><div class="day-num">${d.getDate()}</div>`;

          const divider = document.createElement("div");
          divider.className = "divider";

          const eventsDiv = document.createElement("div");
          eventsDiv.className = "events";

          if (evs.length === 0) {
            eventsDiv.innerHTML = '<span class="empty-text">일정 없음</span>';
          } else {
            evs.forEach((ev) => {
              const done = isDone(ev.date, ev.title);
              const row = document.createElement("div");
              row.className = "event" + (done ? " done" : "");

              const cb = document.createElement("input");
              cb.type = "checkbox";
              cb.className = "event-check";
              cb.checked = done;
              cb.addEventListener("change", () => {
                toggleDone(ev.date, ev.title);
                row.classList.toggle("done", cb.checked);
              });

              row.appendChild(cb);
              row.insertAdjacentHTML(
                "beforeend",
                `
          <span class="event-time">${ev.time}</span>
          <span class="event-dot cat-${ev.cat}"></span>
          <span class="event-title">${ev.title}</span>`,
              );
              eventsDiv.appendChild(row);
            });
          }

          card.appendChild(label);
          card.appendChild(divider);
          card.appendChild(eventsDiv);
          container.appendChild(card);
        }
      }

      function renderMonth() {
        const year = monthCursor.getFullYear();
        const month = monthCursor.getMonth();

        document.getElementById("nav-label").textContent =
          `${MONTH_EN[month]} ${year}`;

        const firstDay = new Date(year, month, 1).getDay();
        const daysInMon = new Date(year, month + 1, 0).getDate();
        const prevDays = new Date(year, month, 0).getDate();

        const container = document.getElementById("month-view");
        container.innerHTML = "";

        const grid = document.createElement("div");
        grid.className = "month-grid";

        const headRow = document.createElement("div");
        headRow.className = "month-row";
        DAY_EN.forEach((name, i) => {
          const h = document.createElement("div");
          h.className =
            "month-head" + (i === 0 ? " sun" : i === 6 ? " sat" : "");
          h.textContent = name;
          headRow.appendChild(h);
        });
        grid.appendChild(headRow);

        const totalCells = Math.ceil((firstDay + daysInMon) / 7) * 7;
        let bodyRow = null;

        for (let i = 0; i < totalCells; i++) {
          if (i % 7 === 0) {
            bodyRow = document.createElement("div");
            bodyRow.className = "month-row";
            grid.appendChild(bodyRow);
          }

          let cellDate,
            isOther = false;
          if (i < firstDay) {
            cellDate = new Date(year, month - 1, prevDays - (firstDay - 1 - i));
            isOther = true;
          } else if (i >= firstDay + daysInMon) {
            cellDate = new Date(year, month + 1, i - firstDay - daysInMon + 1);
            isOther = true;
          } else {
            cellDate = new Date(year, month, i - firstDay + 1);
          }

          const dow = cellDate.getDay();
          const cell = document.createElement("div");
          cell.className =
            "month-cell" +
            (isOther ? " other" : "") +
            (dow === 0 ? " sun" : dow === 6 ? " sat" : "") +
            (!isOther && sameYMD(cellDate, TODAY) ? " today" : "");

          const num = document.createElement("div");
          num.className = "cell-num";
          num.textContent = cellDate.getDate();
          cell.appendChild(num);

          const dots = document.createElement("div");
          dots.className = "cell-dots";
          if (!isOther) {
            const ds = fmt(cellDate);
            const cats = [
              ...new Set(EVENTS.filter((e) => e.date === ds).map((e) => e.cat)),
            ];
            cats.slice(0, 4).forEach((cat) => {
              const dot = document.createElement("span");
              dot.className = `event-dot cat-${cat}`;
              dots.appendChild(dot);
            });
          }
          cell.appendChild(dots);

          bodyRow.appendChild(cell);
        }

        container.appendChild(grid);
      }

      render();
    </script>
  </body>
</html>
