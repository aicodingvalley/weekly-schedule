<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weekly Schedule</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: #f2ede7;
      min-height: 100vh;
      padding: 40px 20px 60px;
    }

    .container { max-width: 720px; margin: 0 auto; }

    h1 {
      font-size: 2.6rem; font-weight: 800; letter-spacing: 0.18em;
      color: #2c2c2c; text-align: center; margin-bottom: 36px;
    }

    .week-nav {
      display: flex; align-items: center; justify-content: center;
      gap: 20px; margin-bottom: 32px;
    }
    .week-nav button {
      background: #e9e3dc; border: none;
      width: 40px; height: 40px; border-radius: 10px;
      font-size: 1.1rem; color: #8a8a8a; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .week-nav button:hover { background: #ded6cc; }
    .week-label {
      font-size: 1.05rem; color: #8a8a8a; font-weight: 500;
    }

    .day-card {
      background: #fff; border-radius: 22px; padding: 22px 28px;
      margin-bottom: 14px; display: flex; align-items: center;
      gap: 28px; box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    .day-label { min-width: 56px; text-align: left; }
    .day-name {
      font-size: 0.85rem; font-weight: 600; letter-spacing: 0.12em;
      color: #b2b2b2; text-transform: uppercase; margin-bottom: 2px;
    }
    .day-num {
      font-size: 2.4rem; font-weight: 800; color: #2c2c2c; line-height: 1;
    }

    .divider {
      width: 1px; background: #ece8e3;
      align-self: stretch; min-height: 56px;
    }

    .events { flex: 1; display: flex; flex-direction: column; gap: 14px; }
    .empty-text { color: #b9b4ad; font-size: 0.95rem; }

    .event { display: flex; align-items: center; gap: 14px; }

    .event-check {
      appearance: none; -webkit-appearance: none;
      width: 20px; height: 20px; border-radius: 6px;
      border: 2px solid #d6d1cb; background: #fff;
      cursor: pointer; flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
      position: relative;
    }
    .event-check:checked { background: #3d6cff; border-color: #3d6cff; }
    .event-check:checked::after {
      content: ''; position: absolute; left: 4px; top: 1px;
      width: 5px; height: 10px; border: 2px solid #fff;
      border-top: none; border-left: none; transform: rotate(45deg);
    }

    .event-time {
      font-size: 1rem; font-weight: 600; color: #3d6cff;
      min-width: 56px;
    }
    .event-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .event-title { font-size: 1.05rem; color: #2c2c2c; font-weight: 600; }

    .event.done .event-title { text-decoration: line-through; color: #bbb; }
    .event.done .event-time { color: #bbb; }

    .cat-work     { background: #3d6cff; }
    .cat-health   { background: #4fcf7a; }
    .cat-social   { background: #ffad4f; }
    .cat-personal { background: #c97bff; }

    @media (max-width: 500px) {
      h1 { font-size: 2.1rem; letter-spacing: 0.15em; }
      .day-card { gap: 18px; padding: 18px 20px; border-radius: 18px; }
      .day-label { min-width: 48px; }
      .day-num { font-size: 2rem; }
      .event-time { font-size: 0.95rem; min-width: 52px; }
      .event-title { font-size: 1rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>WEEKLY</h1>

  <div class="week-nav">
    <button onclick="changeWeek(-1)" aria-label="이전 주">&#8592;</button>
    <span class="week-label" id="week-label"></span>
    <button onclick="changeWeek(1)" aria-label="다음 주">&#8594;</button>
  </div>

  <div id="week-cards"></div>
</div>

<script>
const EVENTS = [
  { date:'2026-04-13', time:'10:00', title:'팀 주간회의',      cat:'work'     },
  { date:'2026-04-13', time:'19:00', title:'헬스 PT',          cat:'health'   },
  { date:'2026-04-14', time:'14:00', title:'A사 미팅',         cat:'work'     },
  { date:'2026-04-14', time:'저녁',  title:'선배 약속',        cat:'social'   },
  { date:'2026-04-15', time:'9:00',  title:'메일 정리',        cat:'work'     },
  { date:'2026-04-15', time:'20:00', title:'러닝 5km',         cat:'health'   },
  { date:'2026-04-16', time:'13:00', title:'프로젝트 킥오프',  cat:'work'     },
  { date:'2026-04-16', time:'20:30', title:'엄마 생신 전화',   cat:'social'   },
  { date:'2026-04-17', time:'10:00', title:'클라이언트 피드백',cat:'work'     },
  { date:'2026-04-17', time:'19:00', title:'영화 약속',        cat:'social'   },
  { date:'2026-04-18', time:'11:00', title:'브런치 수진이',    cat:'social'   },
  { date:'2026-04-18', time:'15:00', title:'독서카페',         cat:'personal' },
];

const DAY_EN = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
const MONTH_EN = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];

const BASE_WEEK_START = new Date(2026, 3, 12);
let weekOffset = 0;

function pad(n) { return String(n).padStart(2,'0'); }
function fmt(d) { return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }

function getWeekStart(offset) {
  const d = new Date(BASE_WEEK_START);
  d.setDate(d.getDate() + offset * 7);
  d.setHours(0,0,0,0);
  return d;
}

function doneKey(date, title) { return `done:${date}:${title}`; }
function isDone(date, title) { return localStorage.getItem(doneKey(date,title)) === '1'; }
function toggleDone(date, title) {
  const k = doneKey(date,title);
  localStorage.getItem(k) === '1'
    ? localStorage.removeItem(k)
    : localStorage.setItem(k, '1');
}

function renderWeek() {
  const start = getWeekStart(weekOffset);
  const end = new Date(start); end.setDate(end.getDate() + 6);

  document.getElementById('week-label').textContent =
    `${MONTH_EN[start.getMonth()]} ${start.getDate()} – ${end.getDate()}, ${start.getFullYear()}`;

  const container = document.getElementById('week-cards');
  container.innerHTML = '';

  for (let i = 0; i < 7; i++) {
    const d = new Date(start); d.setDate(d.getDate() + i);
    const ds = fmt(d);
    const evs = EVENTS.filter(e => e.date === ds);

    const card = document.createElement('div');
    card.className = 'day-card';

    const label = document.createElement('div');
    label.className = 'day-label';
    label.innerHTML = `<div class="day-name">${DAY_EN[d.getDay()]}</div><div class="day-num">${d.getDate()}</div>`;

    const divider = document.createElement('div');
    divider.className = 'divider';

    const eventsDiv = document.createElement('div');
    eventsDiv.className = 'events';

    if (evs.length === 0) {
      eventsDiv.innerHTML = '<span class="empty-text">일정 없음</span>';
    } else {
      evs.forEach(ev => {
        const done = isDone(ev.date, ev.title);
        const row = document.createElement('div');
        row.className = 'event' + (done ? ' done' : '');

        const cb = document.createElement('input');
        cb.type = 'checkbox'; cb.className = 'event-check';
        cb.checked = done;
        cb.addEventListener('change', () => {
          toggleDone(ev.date, ev.title);
          row.classList.toggle('done', cb.checked);
        });

        row.appendChild(cb);
        row.insertAdjacentHTML('beforeend', `
          <span class="event-time">${ev.time}</span>
          <span class="event-dot cat-${ev.cat}"></span>
          <span class="event-title">${ev.title}</span>`);
        eventsDiv.appendChild(row);
      });
    }

    card.appendChild(label);
    card.appendChild(divider);
    card.appendChild(eventsDiv);
    container.appendChild(card);
  }
}

function changeWeek(dir) { weekOffset += dir; renderWeek(); }

renderWeek();
</script>
</body>
</html>
